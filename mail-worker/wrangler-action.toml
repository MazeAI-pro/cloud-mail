name = "${NAME}"
main = "src/index.js"
compatibility_date = "2025-06-04"

[observability]
enabled = true

# 自定义域名（mail.mazeai.pro）在 Cloudflare Dashboard 绑定，CI 不再通过 [[routes]] 维护，
# 避免需要 Zone > Workers Routes 权限，也不影响已有域名绑定。

[[d1_databases]]
binding = "db"
database_name = "cloud-mail" # 数据库的名称
database_id = "${D1_DATABASE_ID}" # 使用占位符引用环境变量

[[kv_namespaces]]
binding = "kv"
id = "${KV_NAMESPACE_ID}" # 使用占位符引用环境变量

[[r2_buckets]]
binding = "r2"
bucket_name = "${R2_BUCKET_NAME}" # 使用占位符引用环境变量

[assets]
binding = "assets"		#静态资源绑定名默认不可修改
directory = "./dist"	#前端vue项目打包的静态资源存放位置,默认dist
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["0 16 * * *"]	#定时任务每天晚上12点执行


[vars]
#orm_log = false
domain = "${DOMAIN}"				#邮件域名可可配置多个 示例: ["example1.com","example2.com"]
admin = "${ADMIN}"				#管理员的邮箱	示例: admin@example.com
jwt_secret = "${JWT_SECRET}"			#jwt令牌的密钥,随便填一串字符串
project_link = "${PROJECT_LINK}"

linuxdo_client_id = "${LINUXDO_CLIENT_ID}"
linuxdo_client_secret = "${LINUXDO_CLIENT_SECRET}"
linuxdo_callback_url = "${LINUXDO_CALLBACK_URL}"
linuxdo_switch = "${LINUXDO_SWITCH}"

feishu_switch = "${FEISHU_SWITCH}"
feishu_app_id = "${FEISHU_APP_ID}"
feishu_redirect_uri = "${FEISHU_REDIRECT_URI}"
FEISHU_ALLOWED_TENANT_KEYS = "${FEISHU_ALLOWED_TENANT_KEYS}"

# people（Maze·小觅）集成：hire@ 收件回调 + 出站发信鉴权
# cloudmail_people_token 通过 wrangler secret put 注入（不落 toml）
people_hire_mailbox = "${PEOPLE_HIRE_MAILBOX}"
people_inbound_url = "${PEOPLE_INBOUND_URL}"

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
